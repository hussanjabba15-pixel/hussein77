<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساباتي الرسمية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0e1621; /* لون خلفية التليجرام الداكنة */
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .header-btn {
            background-color: #4caf50; /* اللون الأخضر للخدمات */
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: none;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px 0;
            margin: 10px 0;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 10px;
            color: white;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            box-sizing: border-box;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* ألوان الأزرار المخصصة الملونة */
        .btn-telegram { background-color: #2b5278; }
        .btn-instagram { background-color: #3b5998; }
        .btn-snapchat { background-color: #b8860b; }
        .btn-footer { background-color: #4caf50; font-size: 15px; margin-top: 15px; }
        .title { margin-bottom: 20px; font-size: 16px; color: #708499; }
    </style>
</head>
<body>

<div class="container">
    <button class="header-btn">🛒 حساباتي الرسمية 🛒</button>
    <div class="title">تشرفوني جميعاً في منصاتي الرسمية 👇</div>

    <a href="https://t.me/dc12i" target="_blank" class="btn btn-telegram">🔹 تليجرام (dc12i)</a>
    <a href="https://t.me/dc11i" target="_blank" class="btn btn-telegram">⚡ تليجرام (dc11i)</a>
    <a href="https://instagram.com/zlf7.old" target="_blank" class="btn btn-instagram">📸 إنستقرام (zlf7.old)</a>
    <a href="https://snapchat.com/add/p6h.3" target="_blank" class="btn btn-snapchat">💛 سناب شات (p6h.3)</a>

    <button class="btn btn-footer" onclick="closeWebApp()">🛡️ إغلاق الصفحة</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // تمديد الصفحة لملء شاشة التليجرام تلقائياً
    function closeWebApp() { tg.close(); }
</script>
</body>
</html>
