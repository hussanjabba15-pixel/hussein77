<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى آيات الغالية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');

        :root {
            --sky-blue: #7dd3fc; /* سماوي هادئ وأنيق */
            --dark-bg: #111827; /* خلفية أسود فخم مائل للكحلي */
            --card-bg: rgba(31, 41, 55, 0.9); /* درجة أفتح للبطاقة مع شفافية بسيطة للنجوم */
            --white: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--white);
            overflow: hidden; /* لمنع شريط التمرير من الظهور بسبب النجوم */
            position: relative;
        }

        /* حاوية النجوم في الخلفية */
        #stars-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1; /* خلف المحتوى البارز */
            overflow: hidden;
        }

        .star {
            position: absolute;
            background-color: var(--white);
            border-radius: 50%;
            animation: drift linear infinite;
            opacity: 0.8;
        }

        @keyframes drift {
            from { transform: translateY(-10vh); }
            to { transform: translateY(110vh); }
        }

        /* حاوية التصميم المرتبة */
        .container {
            width: 85%;
            max-width: 380px;
            padding: 40px 25px;
            background-color: var(--card-bg);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(125, 211, 252, 0.2);
            text-align: center;
            position: relative;
            z-index: 10; /* فوق النجوم */
            backdrop-filter: blur(5px); /* تأثير ضبابي خفيف خلف البطاقة */
            transition: all 0.5s ease;
        }

        h1 {
            color: var(--white);
            font-size: 1.35rem;
            margin-bottom: 35px;
            line-height: 1.6;
            font-weight: 600;
        }

        h1 span {
            color: var(--sky-blue);
            font-weight: 800;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* أزرار Neat */
        .btn {
            padding: 18px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.15rem;
            transition: 0.3s;
            border: none;
            outline: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn-sky {
            background-color: var(--sky-blue);
            color: var(--dark-bg);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--sky-blue);
            border: 2px solid var(--sky-blue);
        }

        .small-text {
            font-size: 0.7rem;
            display: block;
            margin-top: 4px;
            font-weight: 400;
            opacity: 0.8;
        }

        .hidden { display: none; }

        /* زر مبروك */
        #congratsBtn {
            background-color: var(--sky-blue);
            color: var(--dark-bg);
            padding: 22px;
            border-radius: 20px;
            font-size: 1.35rem;
            width: 100%;
            border: none;
            cursor: pointer;
            font-weight: 800;
            margin-top: 20px;
        }

        /* رسالة التهنئة النهائية */
        #finalMessage {
            font-size: 1.1rem;
            line-height: 1.9;
            color: #e2e8f0;
            text-align: center;
            max-height: 70vh; /* لمنع النص من الخروج في الشاشات الصغيرة */
            overflow-y: auto; /* لإضافة تمرير إذا كان النص طويلاً جداً */
            padding-right: 5px;
        }

        .header-quote {
            color: var(--sky-blue);
            font-size: 1.45rem;
            font-weight: 800;
            display: block;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(125, 211, 252, 0.2);
            padding-bottom: 15px;
        }

        .note { color: #9ca3af; font-size: 0.9rem; margin-top: 20px; display: block; }
    </style>
</head>
<body>

    <div id="stars-container"></div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="page1" class="container">
        <h1>هلو <span>آيات</span>، هذا شي بسيط حتى اباركلج بالاعفاء العام ✨</h1>
        <div class="btn-group">
            <button class="btn btn-sky" onclick="nextPage()">هلو</button>
            <button class="btn btn-outline" onclick="nextPage()">
                <span>هلو</span>
                <span class="small-text">مو بكيفج لازم تكولين هلو</span>
            </button>
        </div>
    </div>

    <div id="page2" class="container hidden">
        <div id="btnWrapper">
            <button id="congratsBtn" onclick="showSurprise()">مبروك الاعفاء آيات 🎓</button>
            <span class="note">اضغطي على الزر</span>
        </div>
        <div id="finalMessage" class="hidden"></div>
    </div>

    <script>
        // دالة إنشاء النجوم والشهب
        function createStars() {
            const container = document.getElementById('stars-container');
            const starCount = 60; // عدد النجوم
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // حجم عشوائي للنجوم (من 1 إلى 3 بكسل)
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                // موقع أفقي وعمودي عشوائي (لبدء الأنيميشن في أماكن مختلفة)
                star.style.left = Math.random() * 100 + '%';
                star.style.top = (Math.random() * 100 - 10) + '%'; // يبدأ بعضها خارج الشاشة من الأعلى
                
                // مدة عشوائية للأنيميشن (سرعات مختلفة) من 4 إلى 10 ثوانٍ
                star.style.animationDuration = (Math.random() * 6 + 4) + 's';
                
                // تأخير عشوائي لبدء الحركة
                star.style.animationDelay = (Math.random() * 3) + 's';

                container.appendChild(star);
            }
        }

        // تشغيل إنشاء النجوم عند تحميل الصفحة
        window.onload = createStars;

        function nextPage() {
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').classList.remove('hidden');
        }

        function showSurprise() {
            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log("Audio play blocked"));

            document.getElementById('btnWrapper').style.display = 'none';
            const finalMsg = document.getElementById('finalMessage');
            finalMsg.classList.remove('hidden');
            
            // نص المعايدة المرتب والمعدل لآيات
            const text = "ولكل مجتهد نصيب\n\nالف الف مبروك الاعفاء العام آيات وان شاء الله نشوفج باعلى المراتب ومن نجاح الى نجاح وان شاء الله مو اول ولا اخر مره تنعفين وتستمرين بالنجاح ويوم النجاح الاكبر الي هو نجاحج من السادس وتجيبين المعدل الي تريدينه وتفرحين نفسج واهلج واتمنى الج كل التوفيق صح ما صارلي حتى يوم من عرفتج بس حبيت اباركلج بطريقتي الخاصه وبالتوفيق عيوني 💙.";
            
            let i = 0;
            finalMsg.innerHTML = ""; // تأكد من تفريغ المحتوى قبل البدء

            function typeWriter() {
                if (i < text.length) {
                    // تمييز الجملة الأولى "ولكل مجتهد نصيب" كعنوان
                    if (i < 19) {
                        finalMsg.innerHTML = '<span class="header-quote">' + text.substring(0, i + 1) + '</span>';
                    } else {
                        // النص المتبقي بعد العنوان
                        finalMsg.innerHTML = '<span class="header-quote">ولكل مجتهد نصيب</span>' + text.substring(19, i + 1);
                    }
                    i++;
                    setTimeout(typeWriter, 40); // سرعة الكتابة (40 مللي ثانية)
                    finalMsg.scrollTop = finalMsg.scrollHeight; // التمرير تلقائياً لأسفل
                }
            }
            typeWriter();
        }
    </script>
</body>
</html>
