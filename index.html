<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة خاصة | رسالة معدة لكِ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="particles-js"></div>

    <div id="main-container">
        <div id="step1" class="card fade-in">
            <div class="icon">✉️</div>
            <h1>رسالة معدة خصيصاً لكِ</h1>
            <p>اضغطي لفتح مفاجأة العيد..</p>
            <button class="btn" onclick="startExperience()">افتحي الرسالة</button>
        </div>

        <div id="step2" class="card hidden">
            <h1>عيد فطر مبارك ✨</h1>
            <p id="typewriter"></p>
            <button id="nextBtn" class="btn hidden" onclick="showMusicPage()">الموسيقى 🎵</button>
        </div>

        <div id="step3" class="card hidden">
            <h1>موسيقاكِ المختارة 🎧</h1>
            <div id="music-container">
                <audio id="bgMusic" controls>
                    <source src="song.mp3" type="audio/mpeg">
                </audio>
            </div>
            <div class="signature">من حسين ❤️</div>
            <button class="btn reset-btn" onclick="location.reload()">إعادة العرض</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
