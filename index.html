<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة خاصة | من حسين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --primary: #ff2e63; 
            --accent: #ff9a9e;
            --dark-bg: #0f0c29; 
        }
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden; position: relative;
        }
        #particles-js { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }
        
        .card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px 25px;
            border-radius: 30px; width: 85%; max-width: 380px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); animation: fadeIn 0.8s ease-out;
        }

        .icon { font-size: 60px; margin-bottom: 15px; animation: pulse 2s infinite; filter: drop-shadow(0 0 10px var(--primary)); }
        
        h1 { 
            font-size: 1.5rem; margin-bottom: 20px; 
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        p { font-size: 1.15rem; line-height: 1.8; margin-bottom: 20px; color: #f0f0f0; }

        .btn {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white; border: none; padding: 14px 40px;
            border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(255, 46, 99, 0.3);
            margin-top: 15px;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 15px 30px rgba(255, 46, 99, 0.5); }

        .hidden { display: none; }

        /* تنسيق التوقيع ليكون فوق الخط */
        .signature { 
            font-size: 0.95rem; color: var(--accent); 
            margin-bottom: 10px; font-weight: bold;
            display: block;
        }
        .line { border-top: 1px solid rgba(255, 255, 255, 0.15); margin-bottom: 15px; }

        .heart { position: absolute; user-select: none; pointer-events: none; animation: fall linear forwards; opacity: 0.8; }
        
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        audio { width: 100%; border-radius: 50px; margin: 20px 0; filter: invert(1) hue-rotate(180deg); }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div id="main-container">
        <div id="step1" class="card">
            <div class="icon">✉️</div>
            <h1>معايدة خاصة الج يا أحلى وحدة شافتها عيوني</h1>
            <span class="signature">من حسين</span>
            <div class="line"></div>
            <button class="btn" onclick="startExperience()">افتحي المعايدة</button>
        </div>

        <div id="step2" class="card hidden">
            <h1>عيد فطر مبارك ✨</h1>
            <p id="typewriter"></p>
            <button id="nextBtn" class="btn hidden" onclick="showMusicPage()">الموسيقى 🎵</button>
        </div>

        <div id="step3" class="card hidden">
            <h1>هل أغنية إهداء خاص الج "أحبج" ❤️</h1>
            <audio id="bgMusic" controls>
                <source src="song.mp3" type="audio/mpeg">
            </audio>
            <span class="signature">من حسين</span>
            <div class="line"></div>
            <button class="btn" onclick="location.reload()" style="background: rgba(255,255,255,0.1); font-size: 0.9rem;">إعادة العرض</button>
        </div>
    </div>

    <script>
        const greetingText = "عيد فطر مبارك يا أحلى وحدة شافتها عيوني، والعيد هو شوفتج وشوفت عيونج الحلوة.. كل عام وأنتي بألف ألف خير يارب، ينعاد عليج بالصحة والسلامة وأشوفج بأعلى المراتب وأشوفج أحلى خريجة بالحياة.";
        let charIndex = 0;

        function startExperience() {
            document.getElementById('step1').classList.add('hidden');
            const s2 = document.getElementById('step2');
            s2.classList.remove('hidden');
            typeWriter();
        }

        function typeWriter() {
            const display = document.getElementById("typewriter");
            if (charIndex < greetingText.length) {
                display.innerHTML += greetingText.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 60);
            } else {
                // انفجار احتفالي عند اكتمال المعايدة
                triggerConfetti();
                document.getElementById("nextBtn").classList.remove('hidden');
            }
        }

        function showMusicPage() {
            document.getElementById('step2').classList.add('hidden');
            const s3 = document.getElementById('step3');
            s3.classList.remove('hidden');
            document.getElementById('bgMusic').play();
            // انفجار احتفالي مرة ثانية عند صفحة الموسيقى
            triggerConfetti();
        }

        function triggerConfetti() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;
            (function frame() {
              confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff2e63', '#ffffff', '#ff9a9e'] });
              confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff2e63', '#ffffff', '#ff9a9e'] });
              if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const shapes = ['❤️', '✨', '🌙', '⭐', '🌸'];
            heart.innerText = shapes[Math.floor(Math.random() * shapes.length)];
            heart.style.left = Math.random() * 100 + "vw";
            const duration = Math.random() * 3 + 4;
            heart.style.animationDuration = duration + "s";
            heart.style.fontSize = Math.random() * 15 + 15 + "px";
            document.getElementById('particles-js').appendChild(heart);
            setTimeout(() => { heart.remove(); }, duration * 1000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
